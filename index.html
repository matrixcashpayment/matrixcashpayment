<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMS PRO - Matrix Sweaters Ltd</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --win-accent: #0078d4; --excel-border: #cccccc; --glass: rgba(255, 255, 255, 0.9); }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; margin: 0; }

        /* Login - Moll Coder Model */
        #loginSection { background: radial-gradient(circle at top left, #0078d4, #002d52); height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--glass); backdrop-filter: blur(15px); padding: 45px; border-radius: 30px; width: 100%; max-width: 420px; box-shadow: 0 25px 50px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.4); }
        .login-icon-box { width: 90px; height: 90px; background: white; color: var(--win-accent); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 45px; margin-bottom: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        /* Sidebar & Layout */
        .sidebar { height: 100vh; width: 190px; position: fixed; background: #fff; border-right: 1px solid #ddd; z-index: 100; }
        .nav-link { color: #555; font-size: 14px; padding: 12px 15px; display: block; text-decoration: none; cursor: pointer; transition: 0.2s; border-left: 5px solid transparent; }
        .nav-link:hover, .nav-link.active { background: #f0f7ff; color: var(--win-accent); font-weight: bold; border-left-color: var(--win-accent); }
        .main-content { margin-left: 190px; padding: 35px; min-height: 100vh; }

        /* Table UI Styling */
        .report-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.05); }
        .main-title { font-size: 28px; font-weight: bold; color: #d00000; text-align: center; text-transform: uppercase; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; table-layout: fixed; }
        th, td { border: 1px solid var(--excel-border); text-align: center; padding: 4px 1px; font-size: 12px; }
        .bg-blue { background-color: #203764; color: white; }
        .bg-green { background-color: #e2efda; font-weight: bold; color: #000; }
        
        /* Column Widths (Daily Production) */
        .col-section { width: 85px; } .col-floor { width: 35px; }
        .col-mp { width: 70px; } .col-prod { width: 70px; }
        .col-ppm { width: 45px; } .col-total { width: 60px; }
        .col-pm { width: 100px; } 
        .col-remarks { width: 250px; } 
        
        .input-cell { width: 100%; min-width: 0; border: none; text-align: center; background: transparent; height: 28px; font-weight: 600; font-size: 13px; outline: none; padding: 0; color: #000; }
        .input-remarks { text-align: left !important; padding-left: 10px !important; width: 100%; font-weight: 500; font-size: 12px; border: none; outline: none; background: transparent; color: #000; }
        
        /* Highlight Editable Row */
        .editable-row { background-color: #ededed !important; } /* Halka Gray */
        
        /* Force Black Text on Disabled Inputs */
        .input-cell:disabled, .input-remarks:disabled { 
            color: #000000 !important; 
            opacity: 1 !important; 
            -webkit-text-fill-color: #000000 !important; 
        }

        /* Date Picker Styling - Adjusted Width to Remove Extra Space */
        .date-picker { position: relative; border: none; background: transparent; font-weight: bold; font-family: inherit; font-size: inherit; color: inherit; outline: none; cursor: pointer; text-decoration: none; text-align: left; width: 110px; padding: 0; margin: 0; }
        .date-picker::-webkit-datetime-edit { text-decoration: none; }
        .date-picker::-webkit-calendar-picker-indicator { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; margin: 0; padding: 0; }

        /* Parallelogram Buttons */
        .floor-tabs { display: flex; gap: 12px; }
        .f-btn { border: none; padding: 8px 25px; color: white; cursor: pointer; transform: skewX(-20deg); box-shadow: 2px 3px 6px rgba(0,0,0,0.15); }
        .f-btn span { display: inline-block; transform: skewX(20deg); font-weight: 900; font-size: 13px; }
        .btn-2nd { background-color: #7030a0; } .btn-3rd { background-color: #548235; } .btn-4th { background-color: #c55a11; } .btn-5th { background-color: #2e75b6; } .btn-6th { background-color: #203764; }
        .f-btn.active { outline: 2px solid #000; transform: skewX(-20deg) translateY(-3px); }

        /* Summary Report (Matrix Style) */
        .summary-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; table-layout: fixed; }
        .summary-table th { background-color: #d9d9d9; border: 1px solid #000; font-weight: bold; }
        .summary-table td { border: 1px solid #000; padding: 4px; font-size: 12px; }
        .bg-total-green { background-color: #92d050 !important; font-weight: 900 !important; color: #000; }

        /* Print Settings */
        @media print { 
            @page { size: A4 landscape; margin: 10mm; }
            body { background: #fff; font-size: 11px; }
            .sidebar, .no-print { display: none !important; } 
            .main-content { margin-left: 0 !important; padding: 0 !important; } 
            .report-card { padding: 0 !important; box-shadow: none !important; border: none !important; }
            .d-print-inline { display: inline !important; }
            
            /* Ensure tables do not break in half and colors are printed */
            .summary-table { width: 100% !important; border-collapse: collapse !important; page-break-inside: auto; }
            tr { page-break-inside: avoid; page-break-after: auto; }
            th, td { border: 1px solid #000 !important; word-wrap: break-word; }
            
            /* Force background colors for print */
            th { background-color: #d9d9d9 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .bg-total-green td, .bg-total-green { background-color: #92d050 !important; color: #000 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            
            .input-cell:disabled, .input-remarks:disabled { color: #000 !important; -webkit-text-fill-color: #000 !important; }
        }
    </style>
</head>
<body>

<!-- Login Section -->
<div id="loginSection">
    <div class="login-card text-center">
        <div class="login-icon-box"><i class="bi bi-cpu-fill"></i></div>
        <h2 class="mb-4">IMS PORTAL</h2>
        <div class="mb-3"><input type="text" id="login_u" class="form-control" placeholder="Username"></div>
        <div class="mb-4"><input type="password" id="login_p" class="form-control" placeholder="Password"></div>
        <button class="btn btn-primary w-100 fw-bold" onclick="handleLogin()">SIGN IN</button>
        <div id="loginError" class="text-danger mt-3 small fw-bold"></div>
    </div>
</div>

<div id="mainDashboard" style="display: none;">
    <!-- Sidebar -->
    <div class="sidebar shadow no-print">
        <div class="p-4 text-center"><h5 class="fw-bold text-primary">DASHBOARD</h5><hr></div>
        <div class="nav-link active" onclick="showSection('report')"><i class="bi bi-pencil-square me-2"></i> Daily Production</div>
        <div class="nav-link" onclick="showSection('summary')"><i class="bi bi-file-earmark-bar-graph me-2"></i> Section Summary</div>
        <div class="nav-link" id="adminMenu" style="display: none;" onclick="showSection('users')"><i class="bi bi-people-fill me-2"></i> Access Rules</div>
        <hr>
        <div class="nav-link text-danger fw-bold" onclick="handleLogout()"><i class="bi bi-power me-2"></i> LOGOUT</div>
    </div>

    <div class="main-content">
        <!-- Daily Production Entry -->
        <div id="reportSection">
            <div class="report-card">
                <div class="main-title">DAILY PRODUCTION REPORT</div>
                <div class="text-center fw-bold text-primary mb-2">FLOOR - <span id="activeFloor">5TH</span></div>
                <div class="text-center fw-bold mb-3 d-flex justify-content-center align-items-center gap-1" style="background-color: #fce4d6; padding: 6px;">
                    DATE - <input type="date" id="reportDate" class="date-picker" onchange="changeDate(this.value)">
                </div>
                <table>
                    <tbody id="reportRows"></tbody>
                </table>
                <div class="d-flex justify-content-between align-items-center mt-4 no-print">
                    <div id="bottomUserInfo" class="fw-bold text-dark fs-6" style="background:#f8f9fa; padding:8px 15px; border-left:5px solid #0078d4; border-radius: 5px;"></div>
                    <div class="floor-tabs">
                        <button class="f-btn btn-2nd" onclick="switchFloor('2nd', this)"><span>2ND FLOOR</span></button>
                        <button class="f-btn btn-3rd" onclick="switchFloor('3rd', this)"><span>3RD FLOOR</span></button>
                        <button class="f-btn btn-4th" onclick="switchFloor('4th', this)"><span>4TH FLOOR</span></button>
                        <button class="f-btn btn-5th active" onclick="switchFloor('5th', this)"><span>5TH FLOOR</span></button>
                        <button class="f-btn btn-6th" onclick="switchFloor('6th', this)"><span>6TH FLOOR</span></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Section Summary Section -->
        <div id="summarySection" style="display: none;">
            <div class="report-card">
                <!-- Action Buttons: Print & Export Excel -->
                <div class="d-flex justify-content-end gap-2 mb-2 no-print">
                    <button class="btn btn-sm btn-success fw-bold shadow-sm" onclick="exportToExcel()"><i class="bi bi-file-earmark-excel"></i> Export Excel</button>
                    <button class="btn btn-sm btn-primary fw-bold shadow-sm" onclick="window.print()"><i class="bi bi-printer"></i> Print Summary</button>
                </div>
                
                <div id="printHeader" class="text-center border-bottom border-dark mb-3">
                    <h2 class="fw-bold m-0" style="color: #000;">MATRIX SWEATERS LTD</h2>
                    <p class="fw-bold fs-5 m-0" style="color: #000;">Daily Production Report Summary</p>
                    <p class="fw-bold fs-6 mb-2 d-flex justify-content-center align-items-center gap-1" style="color: #555;">
                        Date: <input type="date" id="summaryDatePicker" class="date-picker no-print" onchange="changeSummaryDate(this.value)">
                        <span class="d-none d-print-inline" id="printSummaryDate"></span>
                    </p>
                </div>
                <div id="summaryContainer"></div>
            </div>
        </div>

        <!-- Access Rules (Moll Coder Original Model) -->
        <div id="userSection" style="display: none;">
            <h4 class="fw-bold mb-4 text-dark">System Access Control</h4>
            <div class="report-card">
                 <div class="row g-3 mb-4 p-4 bg-light rounded-4 border">
                    <h6 class="fw-bold text-primary mb-3"><i class="bi bi-person-plus-fill me-2"></i>Add New Staff Account</h6>
                    <div class="col-md-3"><label class="small fw-bold">USERNAME</label><input type="text" id="nu" class="form-control"></div>
                    <div class="col-md-2"><label class="small fw-bold">PASSWORD</label><input type="text" id="np" class="form-control"></div>
                    <div class="col-md-2"><label class="small fw-bold">SECTION</label><select id="ns" class="form-select"><option>Linking</option><option>Trimming</option><option>Mending</option><option>Sewing</option><option>Overlock</option><option>Iron</option><option>Packing</option></select></div>
                    <div class="col-md-2"><label class="small fw-bold">FLOOR</label><select id="nf" class="form-select"><option>2nd</option><option>3rd</option><option>4th</option><option>5th</option><option>6th</option></select></div>
                    <div class="col-md-2"><label class="small fw-bold">ROLE</label><select id="nr" class="form-select"><option value="user">User</option><option value="admin">Admin</option></select></div>
                    <div class="col-md-1 d-flex align-items-end"><button class="btn btn-primary w-100 fw-bold" onclick="saveUser()"><i class="bi bi-plus"></i></button></div>
                </div>
                <table class="table table-hover align-middle text-center mt-2">
                    <thead class="table-dark"><tr><th>Name</th><th>Password</th><th>Section</th><th>Floor</th><th>Role</th><th>Remove</th></tr></thead>
                    <tbody id="userTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const defUsers =[{ u: 'admin', p: 'admin', r: 'admin', s: 'All', f: 'All' }];
    let users = JSON.parse(localStorage.getItem('sys_users')) || defUsers;
    let currentUser = null;
    const sectList =["Linking", "Trimming", "Mending", "Sewing", "Overlock", "Iron", "Packing"];
    const floorList =["2nd", "3rd", "4th", "5th", "6th"];

    // Date Utilities
    function getLocalToday() {
        const d = new Date();
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${y}-${m}-${day}`;
    }

    function formatDisplayDate(ymd) {
        if(!ymd) return '';
        const[y, m, d] = ymd.split('-');
        return `${d}/${m}/${y}`;
    }

    let todayStr = getLocalToday();
    let selectedDate = todayStr;
    let selectedSummaryDate = todayStr;

    window.onload = () => {
        document.getElementById('login_u').value = localStorage.getItem('last_user') || '';
        document.getElementById('reportDate').value = selectedDate;
        document.getElementById('summaryDatePicker').value = selectedSummaryDate;
        document.getElementById('printSummaryDate').innerText = formatDisplayDate(selectedSummaryDate);
    };

    function handleLogin() {
        const u = document.getElementById('login_u').value.trim();
        const p = document.getElementById('login_p').value.trim();
        const found = users.find(x => x.u === u && x.p === p);
        if(found) { 
            currentUser = found;
            localStorage.setItem('last_user', u);
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('mainDashboard').style.display = 'block';
            
            // "Username: " instead of "USERNAME: "
            document.getElementById('bottomUserInfo').innerText = `Username: ${u} | Section: ${found.s}`;
            
            if(found.r === 'admin') document.getElementById('adminMenu').style.display = 'block';
            switchFloor(found.f === 'All' ? '5th' : found.f);
            renderUsers();
        } else { document.getElementById('loginError').innerText = "❌ Login Failed!"; }
    }

    function handleLogout() {
        currentUser = null;
        document.getElementById('loginSection').style.display = 'flex';
        document.getElementById('mainDashboard').style.display = 'none';
        document.getElementById('login_p').value = '';
    }

    function changeDate(val) {
        if(!val) { val = getLocalToday(); document.getElementById('reportDate').value = val; }
        selectedDate = val;
        renderReport(document.getElementById('activeFloor').innerText.toLowerCase());
    }

    function changeSummaryDate(val) {
        if(!val) { val = getLocalToday(); document.getElementById('summaryDatePicker').value = val; }
        selectedSummaryDate = val;
        document.getElementById('printSummaryDate').innerText = formatDisplayDate(val);
        renderSummary();
    }

    function switchFloor(fName, btn = null) {
        document.getElementById('activeFloor').innerText = fName.toUpperCase();
        if(btn) { document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
        renderReport(fName);
    }

    function vF(val) {
        return (!val || val == 0 || val === '0') ? '' : val;
    }

    function renderReport(floor) {
        const tb = document.getElementById('reportRows');
        const storageKey = 'sys_prod_' + floor + '_' + selectedDate;
        const sD = JSON.parse(localStorage.getItem(storageKey)) || {};
        
        let rowsHtml = `
            <tr class="bg-blue">
                <th rowspan="2" class="col-section">Section</th>
                <th rowspan="2" class="col-floor bg-light text-dark">Floor</th>
                <th colspan="3">08:00 AM to 07:00 PM</th>
                <th colspan="3">07:00 PM to Above</th>
                <th rowspan="2" class="bg-green col-total text-dark">Total</th>
                <th rowspan="8" class="align-middle col-pm fw-bold text-center" style="background:#f2f2f2; color:#333; font-size: 11px; border: 1px solid var(--excel-border);">PM REPORT<br>ONLY<br>PACKING</th>
                <th rowspan="2" class="col-remarks">Remarks</th>
            </tr>
            <tr class="bg-blue">
                <th class="col-mp">Manpower</th><th class="col-prod">Production</th><th class="col-ppm">PPM</th>
                <th class="col-mp">Manpower</th><th class="col-prod">Production</th><th class="col-ppm">PPM</th>
            </tr>
        `;
        
        sectList.forEach((sec, index) => {
            const d = sD[sec] || { m1:'', p1:'', m2:'', p2:'', pm: '', rem:'' };
            
            // Logic for disabling fields
            let isDisabled = false;
            if (currentUser.r !== 'admin') {
                if (selectedDate !== todayStr) {
                    isDisabled = true;
                } else {
                    if (currentUser.f !== 'All' && currentUser.f !== floor) isDisabled = true;
                    if (currentUser.s !== 'All' && currentUser.s !== sec) isDisabled = true;
                }
            }
            let isL = isDisabled;
            
            let floorCol = index === 0 ? `<td rowspan="${sectList.length}" class="bg-light fw-bold align-middle">${floor}</td>` : '';
            
            let pmCell = '';
            if (sec === "Packing") {
                pmCell = `<td style="background:#d9e1f2;"><input type="number" oninput="autoSave('${floor}', this)" class="input-cell" data-f="pm" value="${vF(d.pm)}" ${isL?'disabled':''}></td>`;
            }

            let remarksCell = `<td><input type="text" oninput="autoSave('${floor}', this)" class="input-remarks" data-f="rem" value="${d.rem || ''}" ${isL?'disabled':''}></td>`;

            rowsHtml += `
                <tr class="data-row ${!isL ? 'editable-row' : ''}">
                    <td class="fw-bold text-start ps-2">${sec}</td>
                    ${floorCol}
                    <td><input type="number" oninput="autoSave('${floor}', this)" class="input-cell" data-f="m1" value="${vF(d.m1)}" ${isL?'disabled':''}></td>
                    <td><input type="number" oninput="autoSave('${floor}', this)" class="input-cell" data-f="p1" value="${vF(d.p1)}" ${isL?'disabled':''}></td>
                    <td class="ppm" style="background:#c9d9f8; font-weight:bold;"></td>
                    <td><input type="number" oninput="autoSave('${floor}', this)" class="input-cell" data-f="m2" value="${vF(d.m2)}" ${isL?'disabled':''}></td>
                    <td><input type="number" oninput="autoSave('${floor}', this)" class="input-cell" data-f="p2" value="${vF(d.p2)}" ${isL?'disabled':''}></td>
                    <td class="ppm" style="background:#c9d9f8; font-weight:bold;"></td>
                    <td class="total bg-green"></td>
                    ${pmCell}
                    ${remarksCell}
                </tr>`;
        });
        
        tb.innerHTML = rowsHtml;
        document.querySelectorAll('.data-row').forEach(r => updateRow(r));
    }

    function autoSave(floor, el) {
        updateRow(el.closest('tr'));
        const data = {};
        const storageKey = 'sys_prod_' + floor + '_' + selectedDate;
        document.querySelectorAll('.data-row').forEach(r => {
            const s = r.cells[0].innerText.trim();
            const pmInp = r.querySelector('[data-f="pm"]');
            data[s] = { 
                m1: r.querySelector('[data-f="m1"]').value, p1: r.querySelector('[data-f="p1"]').value,
                m2: r.querySelector('[data-f="m2"]').value, p2: r.querySelector('[data-f="p2"]').value,
                pm: pmInp ? pmInp.value : (JSON.parse(localStorage.getItem(storageKey))?.[s]?.pm || ''),
                rem: r.querySelector('[data-f="rem"]').value 
            };
        });
        localStorage.setItem(storageKey, JSON.stringify(data));
    }

    function updateRow(r) {
        const m1 = parseFloat(r.querySelector('[data-f="m1"]').value) || 0;
        const p1 = parseFloat(r.querySelector('[data-f="p1"]').value) || 0;
        const m2 = parseFloat(r.querySelector('[data-f="m2"]').value) || 0;
        const p2 = parseFloat(r.querySelector('[data-f="p2"]').value) || 0;

        const ppms = r.querySelectorAll('.ppm');
        ppms[0].innerText = (m1 > 0 && p1 > 0) ? (p1 / m1).toFixed(2) : '';
        ppms[1].innerText = (m2 > 0 && p2 > 0) ? (p2 / m2).toFixed(2) : '';
        
        const totalProd = p1 + p2;
        r.querySelector('.total').innerText = totalProd > 0 ? totalProd : '';
    }

    function renderSummary() {
        const container = document.getElementById('summaryContainer');
        container.innerHTML = '';
        
        sectList.forEach(sec => {
            let sM1=0, sP1=0, sM2=0, sP2=0, sT=0, sPM=0, sRemNum=0;
            let hasNumericRem = false;
            let dataRows =[];
            
            // Check if we have PM or Remarks entry
            let hasPM = false;
            let hasRem = false;
            floorList.forEach(f => {
                const storageKey = 'sys_prod_' + f + '_' + selectedSummaryDate;
                const d = (JSON.parse(localStorage.getItem(storageKey)) || {})[sec] || {};
                if (d.pm && d.pm.toString().trim() !== '') hasPM = true;
                if (d.rem && d.rem.toString().trim() !== '') hasRem = true;
            });

            // Set up dynamic column headers based on PM and Remarks presence
            let extraColsHead = '';
            let extraColsColgroup = '';
            if (hasPM && hasRem) {
                extraColsHead = `<th>PM Report</th><th>Remarks</th>`;
                extraColsColgroup = `<col style="width: 11%;"><col style="width: 12%;">`;
            } else if (hasPM && !hasRem) {
                extraColsHead = `<th>PM Report</th>`;
                extraColsColgroup = `<col style="width: 23%;">`;
            } else {
                extraColsHead = `<th>Remarks</th>`;
                extraColsColgroup = `<col style="width: 23%;">`;
            }
            
            floorList.forEach(f => {
                const storageKey = 'sys_prod_' + f + '_' + selectedSummaryDate;
                const d = (JSON.parse(localStorage.getItem(storageKey)) || {})[sec] || {m1:'',p1:'',m2:'',p2:'',pm:'',rem:''};
                const m1=parseFloat(d.m1)||0, p1=parseFloat(d.p1)||0, m2=parseFloat(d.m2)||0, p2=parseFloat(d.p2)||0;
                
                const pm=parseFloat(d.pm)||0; 
                const remText = d.rem ? d.rem.toString().trim() : '';
                
                // Extracting ANY number from the remark text (e.g. "Reject 150" -> 150, "150" -> 150)
                const numMatch = remText.match(/\d+(\.\d+)?/);
                const remNum = numMatch ? parseFloat(numMatch[0]) : NaN;
                
                // Show row if there is any Production, Manpower, PM Report or Text Remark
                if(m1+p1+m2+p2+pm > 0 || remText !== '') {
                    sM1+=m1; sP1+=p1; sM2+=m2; sP2+=p2; sT+=(p1+p2); sPM+=pm;
                    
                    // Sum numeric remarks
                    if (!isNaN(remNum)) {
                        sRemNum += remNum;
                        hasNumericRem = true;
                    }

                    let extraColsData = '';
                    if (hasPM && hasRem) {
                        extraColsData = `<td class="text-center">${d.pm || ''}</td><td class="text-start ps-2">${remText}</td>`;
                    } else if (hasPM && !hasRem) {
                        extraColsData = `<td class="text-center">${d.pm || ''}</td>`;
                    } else {
                        extraColsData = `<td class="text-start ps-2">${remText}</td>`;
                    }

                    dataRows.push(`
                        <td>${f}</td>
                        <td>${m1 > 0 ? m1 : ''}</td>
                        <td>${p1 > 0 ? p1 : ''}</td>
                        <td>${(m1 > 0 && p1 > 0) ? (p1/m1).toFixed(2) : ''}</td>
                        <td>${m2 > 0 ? m2 : ''}</td>
                        <td>${p2 > 0 ? p2 : ''}</td>
                        <td>${(m2 > 0 && p2 > 0) ? (p2/m2).toFixed(2) : ''}</td>
                        <td class="fw-bold">${(p1+p2) > 0 ? (p1+p2) : ''}</td>
                        ${extraColsData}
                    `);
                }
            });

            if(dataRows.length > 0) {
                let rowCount = dataRows.length + 1;
                let tbodyHtml = '';

                dataRows.forEach((row, idx) => {
                    if(idx === 0) {
                        tbodyHtml += `<tr><td rowspan="${rowCount}" class="align-middle fw-bold bg-white">${sec}</td>${row}</tr>`;
                    } else {
                        tbodyHtml += `<tr>${row}</tr>`;
                    }
                });

                // Format totals as "Linking Total = 1000" if number exists, else leave Blank ('')
                let pmTotalText = sPM > 0 ? `PM Total = ${sPM}` : '';
                let remTotalText = hasNumericRem ? `${sec} Total = ${sRemNum}` : '';

                let extraColsTotal = '';
                if (hasPM && hasRem) {
                    extraColsTotal = `<td class="text-center fw-bold text-dark">${pmTotalText}</td><td class="text-start ps-2 fw-bold text-dark">${remTotalText}</td>`;
                } else if (hasPM && !hasRem) {
                    extraColsTotal = `<td class="text-center fw-bold text-dark">${pmTotalText}</td>`;
                } else {
                    extraColsTotal = `<td class="text-start ps-2 fw-bold text-dark">${remTotalText}</td>`;
                }
                
                tbodyHtml += `<tr class="bg-total-green">
                    <td class="text-center fw-bold">Total =</td>
                    <td>${sM1 > 0 ? sM1 : ''}</td>
                    <td>${sP1 > 0 ? sP1 : ''}</td>
                    <td>${(sM1 > 0 && sP1 > 0) ? (sP1/sM1).toFixed(2) : ''}</td>
                    <td>${sM2 > 0 ? sM2 : ''}</td>
                    <td>${sP2 > 0 ? sP2 : ''}</td>
                    <td>${(sM2 > 0 && sP2 > 0) ? (sP2/sM2).toFixed(2) : ''}</td>
                    <td class="fw-bold">${sT > 0 ? sT : ''}</td>
                    ${extraColsTotal}
                </tr>`;

                container.innerHTML += `<table class="summary-table">
                    <colgroup>
                        <col style="width: 11%;">  <!-- Section -->
                        <col style="width: 6%;">   <!-- Floor -->
                        <col style="width: 9%;">   <!-- Manpower -->
                        <col style="width: 10%;">  <!-- 7 PM Prod -->
                        <col style="width: 7%;">   <!-- PPM -->
                        <col style="width: 9%;">   <!-- Manpower -->
                        <col style="width: 10%;">  <!-- 9 PM Prod -->
                        <col style="width: 7%;">   <!-- PPM -->
                        <col style="width: 8%;">   <!-- Total -->
                        ${extraColsColgroup}
                    </colgroup>
                    <thead>
                        <tr>
                            <th>Section</th><th>Floor</th><th>Manpower</th><th>7:00 PM</th><th>PPM</th>
                            <th>Manpower</th><th>9:00 PM</th><th>PPM</th><th>Total</th>${extraColsHead}
                        </tr>
                    </thead>
                    <tbody>${tbodyHtml}</tbody>
                </table>`;
            }
        });
    }

    // Advanced Export to Excel to match design format
    function exportToExcel() {
        let summaryTables = document.getElementById('summaryContainer').innerHTML;
        summaryTables = summaryTables.replace(/<table/g, '<table border="1" cellspacing="0" cellpadding="5" ');
        
        let printHtml = `
            <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
            <head>
                <meta charset="utf-8">
                <style>
                    table { border-collapse: collapse; width: 100%; margin-bottom: 25px; font-family: 'Segoe UI', Tahoma, sans-serif; }
                    th, td { border: 1px solid #000000; padding: 5px; text-align: center; font-size: 13px; vertical-align: middle; }
                    th { background-color: #d9d9d9 !important; font-weight: bold; }
                    .bg-total-green td, .bg-total-green { background-color: #92d050 !important; font-weight: bold; color: #000000 !important; }
                    .fw-bold { font-weight: bold; }
                    .text-start { text-align: left; }
                    .text-center { text-align: center; }
                    .align-middle { vertical-align: middle; }
                    .bg-white { background-color: #ffffff; }
                </style>
            </head>
            <body>
                <table border="0" style="border: none; width: 100%; margin-bottom: 10px;">
                    <tr><td colspan="10" style="text-align: center; font-size: 26px; font-weight: bold; border: none; color: #000;">MATRIX SWEATERS LTD</td></tr>
                    <tr><td colspan="10" style="text-align: center; font-size: 18px; font-weight: bold; border: none; color: #000;">Daily Production Report Summary</td></tr>
                    <tr><td colspan="10" style="text-align: center; border: none; font-size: 12px; color: #555;">Date: ${formatDisplayDate(selectedSummaryDate)}</td></tr>
                </table>
                ${summaryTables}
            </body>
            </html>
        `;

        let blob = new Blob([printHtml], { type: 'application/vnd.ms-excel' });
        let url = URL.createObjectURL(blob);
        let link = document.createElement("a");
        link.href = url;
        link.download = `Production_Summary_${selectedSummaryDate}.xls`;
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function showSection(s) {
        document.getElementById('reportSection').style.display = s==='report'?'block':'none';
        document.getElementById('summarySection').style.display = s==='summary'?'block':'none';
        document.getElementById('userSection').style.display = s==='users'?'block':'none';
        if(s==='summary') renderSummary();
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    }

    function renderUsers() {
        document.getElementById('userTableBody').innerHTML = users.map((u, i) => `<tr><td>${u.u}</td><td>${u.p}</td><td>${u.s}</td><td>${u.f}</td><td>${u.r.toUpperCase()}</td><td><button class="btn btn-sm btn-outline-danger" onclick="delUser(${i})"><i class="bi bi-trash"></i></button></td></tr>`).join('');
    }
    function saveUser() {
        users.push({ u: document.getElementById('nu').value, p: document.getElementById('np').value, s: document.getElementById('ns').value, f: document.getElementById('nf').value, r: 'user' });
        localStorage.setItem('sys_users', JSON.stringify(users)); renderUsers();
        document.getElementById('nu').value = ''; document.getElementById('np').value = '';
    }
    function delUser(i) { if(confirm('Delete?')) { users.splice(i,1); localStorage.setItem('sys_users', JSON.stringify(users)); renderUsers(); } }

</script>
</body>
</html>
